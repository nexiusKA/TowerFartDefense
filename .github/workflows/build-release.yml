name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate HTML structure
        run: |
          echo "Checking index.html..."
          if grep -q "<!DOCTYPE html>" index.html; then
            echo "✓ Valid HTML5 doctype"
          else
            echo "✗ Missing HTML5 doctype"
            exit 1
          fi
          if grep -q '<canvas id="gameCanvas">' index.html; then
            echo "✓ Game canvas found"
          else
            echo "✗ Missing game canvas element"
            exit 1
          fi
          if grep -q "js/main.js" index.html; then
            echo "✓ Main script loaded"
          else
            echo "✗ Main script not found in HTML"
            exit 1
          fi

      - name: Verify all JavaScript game modules exist
        run: |
          echo "Verifying game modules..."
          required_files=(
            "js/constants.js"
            "js/defs.js"
            "js/audio.js"
            "js/particles.js"
            "js/enemy.js"
            "js/projectile.js"
            "js/tower.js"
            "js/wave.js"
            "js/game.js"
            "js/main.js"
          )
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file"
            else
              echo "✗ Missing $file"
              exit 1
            fi
          done

      - name: Check CSS file
        run: |
          if [ -f "css/style.css" ]; then
            echo "✓ css/style.css found"
            wc -l css/style.css
          else
            echo "✗ css/style.css missing"
            exit 1
          fi

      - name: List audio files
        run: |
          echo "Audio files in repository:"
          find . -name "*.mp3" -type f

      - name: Validate JavaScript syntax
        run: |
          npm install --save-dev @babel/parser
          cat > /tmp/check-syntax.js << 'EOF'
          const fs = require('fs');
          const parser = require('@babel/parser');

          const files = [
            'js/constants.js',
            'js/defs.js',
            'js/audio.js',
            'js/particles.js',
            'js/enemy.js',
            'js/projectile.js',
            'js/tower.js',
            'js/wave.js',
            'js/game.js',
            'js/main.js'
          ];

          let hasErrors = false;
          files.forEach(file => {
            try {
              const code = fs.readFileSync(file, 'utf8');
              parser.parse(code, { sourceType: 'module', allowImportExportEverywhere: true });
              console.log(`✓ ${file} - Valid syntax`);
            } catch (e) {
              console.error(`✗ ${file} - Syntax error: ${e.message}`);
              hasErrors = true;
            }
          });

          if (hasErrors) process.exit(1);
          EOF
          NODE_PATH=$(pwd)/node_modules node /tmp/check-syntax.js

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          cname: false
